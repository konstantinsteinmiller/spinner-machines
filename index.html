  />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/images/icons/icon_192x192.png">
  <title>Spinner Machines</title>
  <style>
      /* Static splash — renders instantly before any JS loads */
      body {
          margin: 0;
          background: #0d1117;
      }

      #static-splash {
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0d1117 url('/images/bg/spinner-machines-bg-tile_256x256.webp') repeat;
          background-size: 128px 128px;
          transition: opacity 0.4s ease-out;
      }

      #static-splash.hidden {
          opacity: 0;
          pointer-events: none;
      }

      #static-splash img {
          width: 40vmin;
          height: 40vmin;
          max-width: 256px;
          max-height: 256px;
          object-fit: contain;
          animation: splash-pulse 1.5s ease-in-out infinite;
      }

      @keyframes splash-pulse {
          0%, 100% {
              opacity: 0.3;
          }
          50% {
              opacity: 0.7;
          }
      }
  </style>
</head>
<body>
<!-- Static splash screen — visible before JS loads -->
<div id="static-splash">
  <img src="/images/logo/logo_256x256.webp" alt="Loading...">
</div>
<!-- Workaround: Wavedash service worker crashes when Sentry sends
     keepalive fetch with a ReadableStream body. Convert stream to
     ArrayBuffer so the SW can clone the request. -->
<script>
  (function() {
    var f = window.fetch.bind(window)
    window.fetch = function(i, o) {
      if (o && o.keepalive && o.body instanceof ReadableStream) {
        return new Response(o.body).arrayBuffer().then(function(b) {
          return f(i, Object.assign({}, o, { body: b }))
        })
      }
      return f.apply(window, arguments)
    }
  })()
</script>
<!-- Load the SDK before your game code -->
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
